name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.16.0
    
    - name: Check formatting
      run: zig fmt --check .

  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        zig-version: [0.15.2, 0.16.0]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: ${{ matrix.zig-version }}
    
    - name: Build
      run: zig build

  test:
    runs-on: ubuntu-latest
    needs: build
    
    strategy:
      matrix:
        zig-version: [0.15.2, 0.16.0]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: ${{ matrix.zig-version }}
    
    - name: Run tests
      run: zig build test --summary all
